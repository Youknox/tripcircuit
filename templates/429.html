<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trop de requêtes — GoAndTrip</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: linear-gradient(135deg, #f97316 0%, #ec4899 55%, #7c3aed 100%);
            --dark: #0f0f0f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            background: var(--brand);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        p {
            color: #aaa;
            font-size: 1.1rem;
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .countdown {
            font-size: 1rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            background: var(--brand);
            color: #fff;
            text-decoration: none;
            transition: opacity .2s;
        }

        .btn:hover { opacity: .85; }
    </style>
</head>
<body>
    <div class="icon">⏱️</div>
    <h1>Trop de requêtes</h1>
    <p>
        Vous avez effectué trop de demandes en peu de temps.<br>
        Merci de patienter une minute avant de réessayer.
    </p>
    <p class="countdown" id="countdown"></p>
    <a href="/organiser" class="btn">Retour à l'organisateur</a>

    <script>
        let seconds = 60;
        const el = document.getElementById('countdown');
        function tick() {
            if (seconds <= 0) {
                el.textContent = 'Vous pouvez réessayer maintenant.';
                return;
            }
            el.textContent = `Réessayez dans ${seconds}s…`;
            seconds--;
            setTimeout(tick, 1000);
        }
        tick();
    </script>
</body>
</html>
