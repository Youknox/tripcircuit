<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="pinG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="mapL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="55%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="mapR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi violet (icône app) -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- ── CARTE ── -->
  <path d="M6 60 L44 50 L44 88 L6 92 Z" fill="url(#mapL)"/>
  <path d="M56 50 L94 60 L94 92 L56 88 Z" fill="url(#mapR)"/>
  <path d="M44 50 L56 50 L56 88 L44 88 Z" fill="#3b0764"/>
  <!-- Lignes carte -->
  <path d="M12 72 Q28 67 44 70" fill="none" stroke="white" stroke-width="1.6" opacity="0.28"/>
  <path d="M56 70 Q72 66 88 72" fill="none" stroke="white" stroke-width="1.6" opacity="0.22"/>

  <!-- ── ROUTE ── -->
  <path d="M30 64 Q50 48 70 61" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <circle cx="30" cy="64" r="2.8" fill="#fbbf24"/>
  <circle cx="50" cy="52" r="2.2" fill="#fbbf24"/>
  <circle cx="70" cy="61" r="2.8" fill="#fbbf24"/>

  <!-- ── PIN GAUCHE ── -->
  <path d="M30 12 C20 12 12 20 12 30 C12 44 30 63 30 63 C30 63 48 44 48 30 C48 20 40 12 30 12 Z"
        fill="url(#pinG)"/>
  <circle cx="30" cy="29" r="8" fill="white" opacity="0.90"/>

  <!-- ── PIN DROIT ── -->
  <path d="M70 23 C62 23 56 30 56 38 C56 48 70 61 70 61 C70 61 84 48 84 38 C84 30 78 23 70 23 Z"
        fill="url(#pinG)"/>
  <circle cx="70" cy="37" r="6" fill="white" opacity="0.90"/>

  <!-- ── AVION ── -->
  <g transform="translate(78,15) rotate(-35)">
    <path d="M0 -8 L10 0 L0 -2 L-10 0 Z" fill="url(#pinG)"/>
    <path d="M-5 -2 L-9 6  L0 3 Z" fill="#f97316"/>
    <path d="M5 -2  L9 6   L0 3 Z" fill="#fbbf24"/>
    <path d="M-3 3 L-2 9 L0 7 L2 9 L3 3 Z" fill="#f97316"/>
  </g>
</svg>
