<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="pinG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="mapL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="55%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="mapR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="routeG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- ── CARTE OUVERTE ── -->
  <!-- Page gauche -->
  <path d="M4 58 L46 46 L46 90 L4 94 Z" fill="url(#mapL)"/>
  <!-- Page droite -->
  <path d="M54 46 L96 58 L96 94 L54 90 Z" fill="url(#mapR)"/>
  <!-- Pli central -->
  <path d="M46 46 L54 46 L54 90 L46 90 Z" fill="#4c1d95"/>
  <!-- Reflet bas gauche -->
  <path d="M4 94 L46 90 L46 95 L4 95 Z" fill="white" opacity="0.10"/>
  <!-- Lignes de route sur la carte -->
  <path d="M10 70 Q30 65 46 68" fill="none" stroke="white" stroke-width="1.8" opacity="0.30"/>
  <path d="M54 68 Q72 64 90 70" fill="none" stroke="white" stroke-width="1.8" opacity="0.25"/>
  <path d="M18 80 L46 76"         fill="none" stroke="white" stroke-width="1.2" opacity="0.20"/>

  <!-- ── ROUTE ENTRE PINS ── -->
  <path d="M30 63 Q50 46 70 60" fill="none" stroke="url(#routeG)" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="30" cy="63" r="3"   fill="#fbbf24"/>
  <circle cx="50" cy="51" r="2.5" fill="#fbbf24"/>
  <circle cx="70" cy="60" r="3"   fill="#fbbf24"/>

  <!-- ── PIN GAUCHE (grand) ── -->
  <path d="M30 10 C19 10 10 19 10 30 C10 45 30 63 30 63 C30 63 50 45 50 30 C50 19 41 10 30 10 Z"
        fill="url(#pinG)"/>
  <path d="M30 10 C19 10 10 19 10 30 C10 45 30 63 30 63 C30 63 50 45 50 30 C50 19 41 10 30 10 Z"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.45"/>
  <circle cx="30" cy="29" r="9" fill="white" opacity="0.92"/>

  <!-- ── PIN DROIT (plus petit) ── -->
  <path d="M70 22 C62 22 55 29 55 38 C55 49 70 60 70 60 C70 60 85 49 85 38 C85 29 78 22 70 22 Z"
        fill="url(#pinG)"/>
  <path d="M70 22 C62 22 55 29 55 38 C55 49 70 60 70 60 C70 60 85 49 85 38 C85 29 78 22 70 22 Z"
        fill="none" stroke="white" stroke-width="1.2" opacity="0.40"/>
  <circle cx="70" cy="37" r="7" fill="white" opacity="0.92"/>

  <!-- ── AVION ── -->
  <g transform="translate(78,14) rotate(-35)">
    <!-- Fuselage + ailes avant -->
    <path d="M0 -8 L10 0 L0 -2 L-10 0 Z" fill="url(#pinG)"/>
    <!-- Ailes arrière -->
    <path d="M-5 -2 L-9 6  L0 3 Z" fill="#f97316"/>
    <path d="M5 -2  L9 6   L0 3 Z" fill="#fbbf24"/>
    <!-- Queue -->
    <path d="M-3 3 L-2 9 L0 7 L2 9 L3 3 Z" fill="#f97316"/>
  </g>
</svg>
