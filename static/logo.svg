<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="52%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi gradient -->
  <rect width="40" height="40" rx="10" fill="url(#brand)"/>

  <!-- Route courbe (itinéraire) -->
  <path
    d="M9 28 C11 23 17 23 20 19 C23 15 27 14 30 10"
    stroke="white"
    stroke-width="2.4"
    stroke-linecap="round"
    opacity="0.75"
    fill="none"
  />

  <!-- Point de départ -->
  <circle cx="9" cy="28" r="3" fill="white" opacity="0.9"/>
  <circle cx="9" cy="28" r="1.5" fill="url(#brand)"/>

  <!-- Avion (destination) -->
  <g transform="translate(30,10) rotate(-45)">
    <!-- Corps -->
    <path d="M0 0 L5 -2.5 L4 2 L0 1 Z" fill="white"/>
    <!-- Aile -->
    <path d="M1.5 0.5 L4.5 -1 L3 3.5 Z" fill="rgba(255,255,255,0.6)"/>
    <!-- Queue -->
    <path d="M-0.5 1 L1.5 4 L0 4 Z" fill="rgba(255,255,255,0.8)"/>
  </g>

  <!-- Point intermédiaire -->
  <circle cx="20" cy="19" r="2" fill="white" opacity="0.6"/>
</svg>
